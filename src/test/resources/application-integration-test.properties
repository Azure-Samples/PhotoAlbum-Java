# Integration test configuration using PostgreSQL Testcontainers
# Note: Database connection properties are dynamically set by Testcontainers via @DynamicPropertySource

# JPA Configuration for PostgreSQL integration tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File upload configuration for testing
app.file-upload.max-file-size-bytes=10485760
app.file-upload.allowed-mime-types=image/jpeg,image/png,image/gif,image/webp
app.file-upload.max-files-per-upload=10

# Logging for integration tests
logging.level.com.photoalbum=DEBUG
logging.level.org.testcontainers=INFO
logging.level.org.springframework.jdbc=DEBUG
