# Docker-specific configuration for Oracle DB
# Database credentials are now managed by Azure Key Vault
# Secrets: db-url, db-username, db-password
# Fallback configuration (used only if Key Vault is not configured):
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@oracle-db:1521:XE}
spring.datasource.username=${DB_USERNAME:photoalbum}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Azure Key Vault Configuration
# Set this to your Key Vault URL (e.g., https://your-keyvault-name.vault.azure.net/)
azure.keyvault.url=${AZURE_KEYVAULT_URL:}

# Character encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# JPA Configuration for Docker
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration - Validation only (photos stored in Oracle database)
app.file-upload.max-file-size-bytes=10485760
app.file-upload.allowed-mime-types=image/jpeg,image/png,image/gif,image/webp
app.file-upload.max-files-per-upload=10

# Other settings remain the same
server.port=8080
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.file-upload.max-file-size-bytes=10485760
app.file-upload.allowed-mime-types=image/jpeg,image/png,image/gif,image/webp
app.file-upload.max-files-per-upload=10

# Logging for Docker
logging.level.com.photoalbum=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=DEBUG